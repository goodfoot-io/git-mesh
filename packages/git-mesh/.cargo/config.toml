[build]
# Redirect cargo's default target dir away from the ./target symlink (which all
# card worktrees share) and away from $HOME/.cache/... defaults.
# CARGO_TARGET_DIR env var (set by yarn scripts) overrides this value.
target-dir = "target-cache"

# Wire sccache at the config.toml level so it applies to direct `cargo`
# invocations and IDE rust-analyzer regardless of shell environment.
# Fail-closed: if sccache binary is absent, rustc refuses to run.
rustc-wrapper = "sccache"

[profile.dev]
# sccache cannot cache incremental artifacts; disable incremental compilation so
# sccache achieves meaningful hit rates on the dev and test profiles.
incremental = false

[profile.test]
incremental = false
